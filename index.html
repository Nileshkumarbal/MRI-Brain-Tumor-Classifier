<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MRI Tumor Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        .card {
            border-radius: 15px;
        }

        #results img {
            max-height: 350px;
            margin-top: 15px;
        }

        /* CHATBOX */
        #chatbox {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #f1f3f5;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* MESSAGE BUBBLES */
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

        /* USER */
        .user-msg {
            align-self: flex-end;
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 5px;
        }

        /* BOT */
        .bot-msg {
            align-self: flex-start;
            background: #ffffff;
            border: 1px solid #ddd;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        /* INPUT */
        .input-group input {
            border-radius: 20px 0 0 20px;
            padding-left: 15px;
        }

        .input-group button {
            border-radius: 0 20px 20px 0;
        }
    </style>
</head>

<body>
<div class="container mt-4">

    <!-- HEADER -->
    <div class="text-center">
        <h1 class="text-primary">MRI Tumor Detection System</h1>
        <p class="text-secondary">Upload MRI image and ask AI about results</p>
    </div>

    <!-- UPLOAD -->
    <div class="card shadow p-4 mt-3">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Select MRI Image</label>
                <input type="file" class="form-control" name="file" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-primary">Upload & Detect</button>
        </form>
    </div>

    {% if result %}
    <!-- RESULT -->
    <div id="results" class="mt-4">
        <div class="card shadow p-3">
            <h4 class="text-success">{{ result }}</h4>
            <p class="text-muted">Confidence: {{ confidence }}</p>
            <img src="{{ file_path }}" class="img-fluid rounded">
        </div>
    </div>

    <!-- CHATBOT -->
    <div class="card shadow mt-4 p-3">
        <h5 class="text-primary">Ask About Your Result</h5>

        <!-- CHAT BOX -->
        <div id="chatbox"></div>

        <!-- INPUT -->
        <div class="input-group mt-3">
            <input type="text" id="userInput" class="form-control" placeholder="Ask something...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>
    </div>
    {% endif %}

</div>

<!-- JS -->
<script>
async function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (!message) return;

    let chatbox = document.getElementById("chatbox");

    // USER MESSAGE
    chatbox.innerHTML += `
        <div class="message user-msg">
            ${message}
        </div>
    `;

    // TYPING INDICATOR
    let typing = document.createElement("div");
    typing.className = "message bot-msg";
    typing.innerText = "Typing...";
    chatbox.appendChild(typing);
    chatbox.scrollTop = chatbox.scrollHeight;

    // API CALL
    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    let data = await res.json();

    // REMOVE TYPING
    typing.remove();

    // BOT MESSAGE
    chatbox.innerHTML += `
        <div class="message bot-msg">
            ${data.response}
        </div>
    `;

    input.value = "";
    chatbox.scrollTop = chatbox.scrollHeight;
}

// ENTER KEY SUPPORT
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
